<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Spelling Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f3f4f6;
            touch-action: manipulation;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        .spell-btn {
            transition: transform 0.1s active;
        }
        .spell-btn:active {
            transform: scale(0.95);
        }
        /* 무적 상태 시각 효과 */
        .invincible-glow {
            box-shadow: 0 0 20px #fbbf24;
            border: 2px solid #fbbf24;
        }
        /* 축하 파티클 애니메이션 */
        @keyframes confetti-fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(800px) rotate(720deg); opacity: 0; }
        }
        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 16px;
            z-index: 50;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans h-[100dvh] w-screen overflow-hidden">

<div id="app" class="flex portrait:flex-col landscape:flex-row w-full h-full overflow-hidden relative">

    <!-- 시작 화면 (전체화면 유도) -->
    <div id="start-screen" class="absolute inset-0 z-50 bg-gray-900/95 flex flex-col items-center justify-center text-white backdrop-blur-sm">
        <h1 class="text-3xl sm:text-5xl font-black mb-2">Dino Spelling</h1>
        <p class="text-sm sm:text-base text-gray-300 mb-8">가로/세로 편한 방향으로 기기를 들고 아래 버튼을 눌러주세요</p>
        <button onclick="startGame()" class="bg-blue-500 hover:bg-blue-600 text-white px-8 py-4 rounded-full font-bold text-xl shadow-lg transition-transform active:scale-95">
            게임 시작 (전체화면)
        </button>
    </div>

    <!-- 좌측(또는 상단): 다이노 게임 영역 -->
    <div id="game-container" class="relative flex-1 landscape:flex-[6] bg-[#f7f7f7] portrait:border-b-4 landscape:border-r-4 border-gray-300 overflow-hidden cursor-pointer transition-colors duration-1000">
        <div class="absolute top-4 left-4 z-10 flex flex-col gap-1">
            <div id="score" class="text-2xl font-bold text-gray-700 transition-colors duration-1000">SCORE: 00000</div>
            <div id="high-score" class="text-sm font-semibold text-gray-500 transition-colors duration-1000">HI: 00000</div>
        </div>
        
        <div id="game-msg" class="absolute inset-0 flex items-center justify-center z-20 hidden">
            <div class="bg-white/90 p-6 rounded-2xl shadow-xl text-center">
                <h2 class="text-3xl font-black text-gray-800 mb-2">GAME OVER</h2>
                <p class="text-gray-600 mb-4">다시 시작하려면 화면을 클릭하거나 키를 누르세요</p>
                <button onclick="resetGame()" class="bg-gray-800 text-white px-6 py-2 rounded-full font-bold">RESTART</button>
            </div>
        </div>

        <!-- 레벨업(진화) 알림 메시지 -->
        <div id="levelup-msg" class="absolute top-1/4 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-30 hidden pointer-events-none">
            <h2 class="text-4xl font-black text-yellow-400 drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] animate-bounce">LEVEL UP! 진화!!</h2>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- 우측(또는 하단): 스펠링 퀴즈 영역 -->
    <!-- 수정됨: overflow-hidden을 overflow-y-auto로 변경하고 p-3 sm:p-6을 p-2 sm:p-4로 줄임 -->
    <div id="quiz-container" class="flex-1 landscape:flex-[4] bg-white flex flex-col p-2 sm:p-4 shadow-2xl z-10 overflow-y-auto relative">
        
        <!-- 생명(하트) 표시 영역 -->
        <!-- 수정됨: top, right 간격을 줄이고 폰트 크기도 최적화 -->
        <div id="life-display" class="absolute top-2 right-2 sm:top-4 sm:right-4 text-sm sm:text-xl tracking-widest z-20 transition-all duration-300">
            ❤️❤️❤️
        </div>

        <!-- 수정됨: space-y-를 줄이고 상하 패딩 조정하여 촘촘하게 배치 -->
        <div class="flex-1 flex flex-col items-center justify-center min-h-0 w-full px-2 py-2">
            <div class="text-center w-full flex flex-col items-center">
                <!-- 레벨 뱃지 및 도화선 타이머 -->
                <div id="level-display" class="inline-block bg-blue-100 text-blue-800 text-[10px] sm:text-sm font-bold px-2 py-0.5 rounded-full shadow-sm mb-1">LEVEL 1</div>
                
                <!-- 도화선 타이머 (Level 4부터 표시) -->
                <div id="fuse-container" class="w-full max-w-[150px] sm:max-w-[200px] h-1.5 sm:h-2 bg-gray-200 rounded-full mt-1 mx-auto overflow-hidden hidden">
                    <div id="fuse-bar" class="h-full bg-red-500 w-full"></div>
                </div>

                <div class="mt-1">
                    <span class="text-[9px] sm:text-xs font-bold text-blue-500 uppercase tracking-widest">Spelling Quiz</span>
                </div>
                <!-- 수정됨: 힌트 아이콘과 텍스트 크기 및 여백 대폭 축소 -->
                <div id="hint-icon" class="text-3xl sm:text-5xl mt-0.5 mb-0.5">🍎</div>
                <h2 id="hint-text" class="text-lg sm:text-2xl font-black text-gray-800">사과</h2>
            </div>

            <!-- 수정됨: 글자 크기와 갭 축소 -->
            <div id="word-display" class="flex gap-1 sm:gap-2 text-xl sm:text-3xl font-mono font-bold text-gray-800 my-1 sm:my-3">
                <!-- A _ _ L E 형태 -->
            </div>

            <!-- 메시지 박스 (결과 알림) -->
            <div id="feedback-msg" class="h-5 sm:h-8 text-xs sm:text-base font-bold transition-all duration-300 opacity-0 mb-1 sm:mb-2">
                정답입니다! (+보너스)
            </div>

            <!-- 선택 블록 영역 -->
            <!-- 수정됨: 그리드 간격 축소 및 버튼 컨테이너 크기 조절 -->
            <div id="options-grid" class="grid grid-cols-2 gap-1.5 sm:gap-3 w-full max-w-[160px] sm:max-w-xs mt-auto mb-2">
                <!-- 버튼들 -->
            </div>
        </div>

        <!-- 하단 상태바 -->
        <div class="mt-auto pt-1 sm:pt-4 border-t border-gray-100 shrink-0">
            <div class="flex items-center justify-between text-[10px] sm:text-xs text-gray-400 font-medium">
                <span>COMBO: <span id="combo-count" class="text-orange-500 font-bold">0</span></span>
                <span>Power Mode: <span id="power-status">OFF</span></span>
            </div>
            <div class="w-full bg-gray-200 h-1 sm:h-1.5 rounded-full mt-1 overflow-hidden">
                <div id="power-bar" class="bg-blue-500 h-full w-0 transition-all duration-300"></div>
            </div>
        </div>
    </div>
</div>

<script>
// --- 효과음 (Web Audio API) 설정 ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playSound(type) {
        if (!gameStarted || audioCtx.state === 'suspended') return;
        
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        
        if (type === 'jump') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
            gainNode.gain.setValueAtTime(0.15, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            gainNode.gain.setValueAtTime(0.1, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
            gainNode.gain.setValueAtTime(0.1, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now);
            osc.stop(now + 0.2);
        } else if (type === 'power') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.setValueAtTime(600, now + 0.1);
            osc.frequency.setValueAtTime(800, now + 0.2);
            gainNode.gain.setValueAtTime(0.1, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
        } else if (type === 'levelup') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.setValueAtTime(500, now + 0.15);
            osc.frequency.setValueAtTime(700, now + 0.3);
            osc.frequency.setValueAtTime(1000, now + 0.45);
            gainNode.gain.setValueAtTime(0.15, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.8);
            osc.start(now);
            osc.stop(now + 0.8);
        } else if (type === 'gameover') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
            gainNode.gain.setValueAtTime(0.2, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        }
    }

    // --- 축하 파티클(Confetti) 로직 ---
    function fireConfetti() {
        const container = document.getElementById('quiz-container');
        const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#42a5f5', '#66bb6a'];
        
        for (let i = 0; i < 40; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti-piece rounded-sm';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.left = Math.random() * 100 + '%';
            conf.style.top = '-20px';
            
            const duration = Math.random() * 1.5 + 1;
            conf.style.animation = `confetti-fall ${duration}s ease-in forwards`;
            
            container.appendChild(conf);
            setTimeout(() => conf.remove(), duration * 1000);
        }
    }

    // --- 데이터 설정 ---
    const quizWords = [
        // Level 1
        { level: 1, word: "CAT", hint: "고양이", icon: "🐱" }, { level: 1, word: "DOG", hint: "개", icon: "🐶" },
        { level: 1, word: "SUN", hint: "태양", icon: "☀️" }, { level: 1, word: "CAR", hint: "자동차", icon: "🚗" },
        { level: 1, word: "HAT", hint: "모자", icon: "🧢" }, { level: 1, word: "BOY", hint: "소년", icon: "👦" },
        { level: 1, word: "PIG", hint: "돼지", icon: "🐷" }, { level: 1, word: "BED", hint: "침대", icon: "🛏️" },
        { level: 1, word: "CUP", hint: "컵", icon: "☕" }, { level: 1, word: "BOX", hint: "상자", icon: "📦" },

        // Level 2
        { level: 2, word: "BIRD", hint: "새", icon: "🐦" }, { level: 2, word: "FISH", hint: "물고기", icon: "🐟" },
        { level: 2, word: "TREE", hint: "나무", icon: "🌳" }, { level: 2, word: "STAR", hint: "별", icon: "⭐" },
        { level: 2, word: "BOOK", hint: "책", icon: "📖" }, { level: 2, word: "MILK", hint: "우유", icon: "🥛" },
        { level: 2, word: "DUCK", hint: "오리", icon: "🦆" }, { level: 2, word: "MOON", hint: "달", icon: "🌙" },
        { level: 2, word: "SHOE", hint: "신발", icon: "👞" }, { level: 2, word: "DOOR", hint: "문", icon: "🚪" },

        // Level 3
        { level: 3, word: "APPLE", hint: "사과", icon: "🍎" }, { level: 3, word: "WATER", hint: "물", icon: "💧" },
        { level: 3, word: "CLOCK", hint: "시계", icon: "⏰" }, { level: 3, word: "MOUSE", hint: "쥐", icon: "🐭" },
        { level: 3, word: "TRAIN", hint: "기차", icon: "🚆" }, { level: 3, word: "GRAPE", hint: "포도", icon: "🍇" },
        { level: 3, word: "HOUSE", hint: "집", icon: "🏠" }, { level: 3, word: "TIGER", hint: "호랑이", icon: "🐯" },
        { level: 3, word: "CHAIR", hint: "의자", icon: "🪑" }, { level: 3, word: "PANDA", hint: "판다", icon: "🐼" },

        // Level 4
        { level: 4, word: "RABBIT", hint: "토끼", icon: "🐰" }, { level: 4, word: "BANANA", hint: "바나나", icon: "🍌" },
        { level: 4, word: "YELLOW", hint: "노란색", icon: "🟨" }, { level: 4, word: "PENCIL", hint: "연필", icon: "✏️" },
        { level: 4, word: "FLOWER", hint: "꽃", icon: "🌸" }, { level: 4, word: "MONKEY", hint: "원숭이", icon: "🐒" },
        { level: 4, word: "SCHOOL", hint: "학교", icon: "🏫" }, { level: 4, word: "ORANGE", hint: "오렌지", icon: "🍊" },
        { level: 4, word: "CHEESE", hint: "치즈", icon: "🧀" }, { level: 4, word: "WINDOW", hint: "창문", icon: "🪟" },

        // Level 5
        { level: 5, word: "DOCTOR", hint: "의사", icon: "👨‍⚕️" }, { level: 5, word: "ANIMAL", hint: "동물", icon: "🐾" },
        { level: 5, word: "CAMERA", hint: "카메라", icon: "📷" }, { level: 5, word: "GUITAR", hint: "기타", icon: "🎸" },
        { level: 5, word: "SUMMER", hint: "여름", icon: "☀️" }, { level: 5, word: "WINTER", hint: "겨울", icon: "❄️" },
        { level: 5, word: "POLICE", hint: "경찰", icon: "👮" }, { level: 5, word: "PLANET", hint: "행성", icon: "🪐" },
        { level: 5, word: "FAMILY", hint: "가족", icon: "👨‍👩‍👧‍👦" }, { level: 5, word: "ROCKET", hint: "로켓", icon: "🚀" },

        // Level 6
        { level: 6, word: "ELEPHANT", hint: "코끼리", icon: "🐘" }, { level: 6, word: "DINOSAUR", hint: "공룡", icon: "🦖" },
        { level: 6, word: "HOSPITAL", hint: "병원", icon: "🏥" }, { level: 6, word: "AIRPLANE", hint: "비행기", icon: "✈️" },
        { level: 6, word: "UMBRELLA", hint: "우산", icon: "☂️" }, { level: 6, word: "COMPUTER", hint: "컴퓨터", icon: "💻" },
        { level: 6, word: "RAINBOW", hint: "무지개", icon: "🌈" }, { level: 6, word: "TEACHER", hint: "선생님", icon: "👩‍🏫" },
        { level: 6, word: "BASEBALL", hint: "야구", icon: "⚾" }, { level: 6, word: "MOUNTAIN", hint: "산", icon: "⛰️" }
    ];

    // --- 진화 시스템 이모지 ---
    const evolutionEmojis = {
        1: '🦎', // 아기 도마뱀
        2: '🐢', // 꼬마 거북이
        3: '🐊', // 날쌘 악어
        4: '🦖', // 티라노
        5: '🦕', // 브라키오
        6: '🐉'  // 마스터 드래곤
    };

    // --- 게임 변수 ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let animationId;
    let gameActive = true;
    let score = 0;
    let highScore = 0;
    let combo = 0;
    let isInvincible = false;
    let invincibleTimer = 0;

    // 다이노 설정 (초기값은 레벨 1 이모지)
    const dino = {
        x: 50,
        y: 0,
        width: 52,
        height: 52,
        dy: 0,
        jumpForce: 15,
        gravity: 0.8,
        grounded: false,
        emoji: evolutionEmojis[1] 
    };

    const plantEmojis = ['🌵', '🌲', '🌴', '🪴'];
    let obstacles = [];
    let gameSpeed = 6;
    let frameCount = 0;
    let gameStarted = false;

    // --- 생명, 퀴즈, 타이머 변수 ---
    let lives = 3;
    const MAX_LIVES = 3;
    let currentQuizIndex = 0;
    let isQuizTransitioning = false; // 정답 맞추고 다음 퀴즈 넘어가는 대기 상태
    
    // 도화선 타이머 (초당 60프레임 * 10초 = 600)
    const QUIZ_TIME_LIMIT = 600; 
    let quizTimer = QUIZ_TIME_LIMIT;

    // --- 초기화 및 실행 ---
    window.onload = () => {
        resizeCanvas();
        updateLivesDisplay();
        initQuiz();
        
        // 클릭/터치/키보드 이벤트 
        document.getElementById('game-container').addEventListener('mousedown', () => {
            if(!gameStarted) return;
            if(gameActive) handleJump();
            else resetGame();
        });
        document.getElementById('game-container').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(!gameStarted) return;
            if(gameActive) handleJump();
            else resetGame();
        });

        window.addEventListener('keydown', (e) => {
            if(!gameStarted) return;
            if (e.code === 'Space' || e.key === ' ' || e.code === 'ArrowUp') {
                e.preventDefault();
                if(gameActive) handleJump();
                else resetGame();
            }
        });
    };

    function startGame() {
        gameStarted = true;
        if (audioCtx.state === 'suspended') audioCtx.resume();

        try {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen().catch(e => {});
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        } catch (error) {}
        
        if (document.activeElement) document.activeElement.blur();

        document.getElementById('start-screen').classList.add('hidden');
        resizeCanvas();
        animate();
    }

    window.addEventListener('resize', resizeCanvas);

    function resizeCanvas() {
        const container = document.getElementById('game-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        dino.y = canvas.height - dino.height - 20;
    }

    function handleJump() {
        if (dino.grounded) {
            dino.dy = -dino.jumpForce;
            dino.grounded = false;
            playSound('jump'); 
        }
    }

    function createObstacle() {
        const size = 40;
        const randomEmoji = plantEmojis[Math.floor(Math.random() * plantEmojis.length)];
        obstacles.push({
            x: canvas.width,
            y: canvas.height - size - 20,
            width: size,
            height: size,
            emoji: randomEmoji
        });
    }

    function drawDino() {
        ctx.save();
        ctx.font = "52px 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif";
        ctx.textBaseline = "bottom";
        
        if (isInvincible) {
            ctx.shadowColor = '#fbbf24';
            ctx.shadowBlur = 20;
            if (frameCount % 10 < 5) ctx.globalAlpha = 0.5;
        } else {
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1.0;
        }

        ctx.translate(dino.x + dino.width / 2, dino.y + dino.height);
        ctx.scale(-1, 1);
        ctx.fillText(dino.emoji, -dino.width / 2, 0);
        ctx.restore();
    }

    function drawObstacles() {
        ctx.font = "40px 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif";
        ctx.textBaseline = "bottom";

        obstacles.forEach((obs, index) => {
            obs.x -= gameSpeed;
            ctx.fillText(obs.emoji, obs.x, obs.y + obs.height);

            const hitMargin = 12;
            if (!isInvincible &&
                dino.x + hitMargin < obs.x + obs.width - hitMargin &&
                dino.x + dino.width - hitMargin > obs.x + hitMargin &&
                dino.y + hitMargin < obs.y + obs.height - hitMargin &&
                dino.y + dino.height - hitMargin > obs.y + hitMargin) {
                gameOver();
            }

            if (obs.x + obs.width < 0) {
                obstacles.splice(index, 1);
                score += 10;
            }
        });
    }

    function drawGround() {
        ctx.strokeStyle = '#d3d3d3';
        ctx.beginPath();
        ctx.moveTo(0, canvas.height - 20);
        ctx.lineTo(canvas.width, canvas.height - 20);
        ctx.stroke();
    }

    function updateLivesDisplay() {
        const lifeEl = document.getElementById('life-display');
        let hearts = '';
        for(let i = 0; i < MAX_LIVES; i++) hearts += i < lives ? '❤️' : '🤍';
        lifeEl.innerText = hearts;

        lifeEl.classList.add('scale-110', 'text-red-500');
        setTimeout(() => lifeEl.classList.remove('scale-110', 'text-red-500'), 200);
    }

    function updateScore() {
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');
        const container = document.getElementById('game-container');

        scoreEl.innerText = `SCORE: ${String(Math.floor(score)).padStart(5, '0')}`;
        highScoreEl.innerText = `HI: ${String(Math.floor(highScore)).padStart(5, '0')}`;

        if (score < 200) {
            container.style.backgroundColor = '#f7f7f7';
            scoreEl.style.color = '#374151';
            highScoreEl.style.color = '#6b7280';
        } else if (score < 400) {
            container.style.backgroundColor = '#fed7aa';
            scoreEl.style.color = '#9a3412';
            highScoreEl.style.color = '#c2410c';
        } else {
            container.style.backgroundColor = '#1e293b';
            scoreEl.style.color = '#f8fafc';
            highScoreEl.style.color = '#cbd5e1';
        }
    }

    function drawNightVision() {
        if (score >= 400) {
            ctx.save();
            const targetRadius = isInvincible ? Math.max(canvas.width, canvas.height) : 120;
            const gradient = ctx.createRadialGradient(
                dino.x + dino.width / 2, dino.y + dino.height / 2, 0,
                dino.x + dino.width / 2, dino.y + dino.height / 2, targetRadius
            );
            gradient.addColorStop(0, 'rgba(30, 41, 59, 0)');
            gradient.addColorStop(1, 'rgba(30, 41, 59, 0.98)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
        }
    }

    function animate() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        frameCount++;
        score += 0.1;

        dino.dy += dino.gravity;
        dino.y += dino.dy;

        if (dino.y > canvas.height - dino.height - 20) {
            dino.y = canvas.height - dino.height - 20;
            dino.dy = 0;
            dino.grounded = true;
        }

        if (frameCount % 100 === 0) createObstacle();

        if (isInvincible) {
            invincibleTimer--;
            if (invincibleTimer <= 0) {
                isInvincible = false;
                document.getElementById('power-status').innerText = "OFF";
                document.getElementById('power-bar').style.width = "0%";
            } else {
                document.getElementById('power-bar').style.width = `${(invincibleTimer / 300) * 100}%`;
            }
        }

        drawGround();
        drawObstacles();
        drawDino();
        drawNightVision();
        updateScore();

        gameSpeed = 6 + Math.floor(score / 500);

        // --- 도화선 타이머 로직 (Level 4 이상) ---
        const currentLevel = quizWords[currentQuizIndex].level;
        if (!isQuizTransitioning && currentLevel >= 4) {
            quizTimer--;
            const percentage = Math.max(0, (quizTimer / QUIZ_TIME_LIMIT) * 100);
            document.getElementById('fuse-bar').style.width = percentage + '%';

            if (quizTimer <= 0) {
                handleTimeUp();
            }
        }

        animationId = requestAnimationFrame(animate);
    }

    function handleTimeUp() {
        playSound('wrong');
        lives--;
        updateLivesDisplay();
        
        if (lives <= 0) {
            showFeedback("시간 초과! 생명 소진 💀", false);
            gameOver();
        } else {
            showFeedback("시간 초과! 하트가 깎입니다.", false);
            combo = 0;
            updateCombo();
            quizTimer = QUIZ_TIME_LIMIT; // 타이머 리셋 후 다시 풀기
            if (navigator.vibrate) navigator.vibrate(100);
        }
    }

    function gameOver() {
        gameActive = false;
        cancelAnimationFrame(animationId);
        playSound('gameover'); 

        if (score > highScore) highScore = score;
        document.getElementById('game-msg').classList.remove('hidden');
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }

    function resetGame() {
        score = 0;
        obstacles = [];
        frameCount = 0;
        gameSpeed = 6;
        gameActive = true;
        isInvincible = false;
        lives = 3;
        currentQuizIndex = 0;
        isQuizTransitioning = false;
        dino.emoji = evolutionEmojis[1]; // 도마뱀으로 초기화
        
        document.getElementById('game-msg').classList.add('hidden');
        document.getElementById('power-bar').style.width = "0%";
        updateScore();
        updateLivesDisplay();
        initQuiz();
        animate();
    }

    // --- 동적 퀴즈 생성 로직 ---
    function initQuiz() {
        const quiz = quizWords[currentQuizIndex];
        isQuizTransitioning = false;
        quizTimer = QUIZ_TIME_LIMIT; // 타이머 초기화
        
        // 레벨 뱃지 및 텍스트 업데이트
        document.getElementById('level-display').innerText = `LEVEL ${quiz.level}`;
        document.getElementById('hint-icon').innerText = quiz.icon;
        document.getElementById('hint-text').innerText = quiz.hint;
        
        // 도화선 타이머 UI 표시 여부 제어
        const fuseContainer = document.getElementById('fuse-container');
        if (quiz.level >= 4) {
            fuseContainer.classList.remove('hidden');
            document.getElementById('fuse-bar').style.width = '100%';
        } else {
            fuseContainer.classList.add('hidden');
        }
        
        const wordDisplay = document.getElementById('word-display');
        wordDisplay.innerHTML = '';
        
        let numBlanks = quiz.level <= 2 ? 1 : (quiz.level <= 4 ? 2 : 3);
        numBlanks = Math.min(numBlanks, quiz.word.length - 1); 
        
        let blanks = [];
        while(blanks.length < numBlanks) {
            let r = Math.floor(Math.random() * quiz.word.length);
            if(!blanks.includes(r)) blanks.push(r);
        }
        quiz.currentBlanks = blanks.sort((a,b) => a-b);
        
        let requiredLetters = quiz.currentBlanks.map(idx => quiz.word[idx]);
        let options = [...new Set(requiredLetters)]; 
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        
        while(options.length < 4) {
            let randomChar = alphabet[Math.floor(Math.random() * alphabet.length)];
            if(!options.includes(randomChar)) options.push(randomChar);
        }
        quiz.currentOptions = options.sort(() => Math.random() - 0.5);
        
        quiz.word.split('').forEach((char, idx) => {
            const span = document.createElement('span');
            if (quiz.currentBlanks.includes(idx)) {
                span.innerText = '_';
                // 수정됨: 밑줄 크기와 너비 축소
                span.className = 'border-b-2 sm:border-b-4 border-gray-300 w-5 sm:w-8 text-center';
                span.id = `blank-${idx}`;
            } else {
                span.innerText = char;
                span.className = 'w-5 sm:w-8 text-center text-gray-400';
            }
            wordDisplay.appendChild(span);
        });

        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        quiz.currentOptions.forEach(letter => {
            const btn = document.createElement('button');
            // 수정됨: 버튼 패딩, 폰트 크기, 하단 테두리 두께 축소
            btn.className = 'spell-btn bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-1.5 sm:py-3 rounded-lg sm:rounded-xl text-sm sm:text-lg shadow-sm border-b-2 sm:border-b-4 border-gray-300 active:border-b-0 active:mt-0.5 sm:active:mt-1';
            btn.innerText = letter;
            btn.onclick = function() {
                if(isQuizTransitioning) return; // 넘어가는 중엔 클릭 방지
                this.blur();
                checkAnswer(letter);
            };
            grid.appendChild(btn);
        });
    }

    function checkAnswer(letter) {
        const quiz = quizWords[currentQuizIndex];
        const firstBlankIdx = quiz.currentBlanks.find(idx => document.getElementById(`blank-${idx}`).innerText === '_');
        
        if (firstBlankIdx !== undefined && quiz.word[firstBlankIdx] === letter) {
            playSound('correct'); 
            
            document.getElementById(`blank-${firstBlankIdx}`).innerText = letter;
            document.getElementById(`blank-${firstBlankIdx}`).classList.remove('text-gray-400');
            document.getElementById(`blank-${firstBlankIdx}`).classList.add('text-blue-600');
            
            const remaining = quiz.currentBlanks.some(idx => document.getElementById(`blank-${idx}`).innerText === '_');
            if (!remaining) {
                isQuizTransitioning = true; // 타이머 일시정지 및 중복 클릭 방지
                showFeedback("참 잘했어요! 무적 모드 발동!", true);
                activatePower();
                setTimeout(() => nextQuiz(), 1000);
            }
        } else {
            playSound('wrong'); 
            
            lives--;
            updateLivesDisplay();
            
            if (lives <= 0) {
                showFeedback("생명을 모두 소진했습니다!", false);
                gameOver();
            } else {
                showFeedback("틀렸어요! 다시 생각해보세요.", false);
                combo = 0;
                updateCombo();
            }
            if (navigator.vibrate) navigator.vibrate(100);
        }
    }

    function showFeedback(msg, isSuccess) {
        const el = document.getElementById('feedback-msg');
        el.innerText = msg;
        el.className = `h-8 text-lg font-bold transition-all duration-300 opacity-100 ${isSuccess ? 'text-green-500' : 'text-red-500'}`;
        setTimeout(() => el.className = 'h-8 text-lg font-bold transition-all duration-300 opacity-0', 1500);
    }

    function activatePower() {
        playSound('power'); 
        fireConfetti();     
        
        combo++;
        updateCombo();
        isInvincible = true;
        invincibleTimer = 300;
        document.getElementById('power-status').innerText = "ON (SUPER!)";
        document.getElementById('power-status').classList.add('text-orange-500');
        score += 100;
    }

    function updateCombo() {
        document.getElementById('combo-count').innerText = combo;
    }

    // --- 진화 시스템 로직 추가 ---
    function nextQuiz() {
        const currentLevel = quizWords[currentQuizIndex].level;
        currentQuizIndex = (currentQuizIndex + 1) % quizWords.length;
        const newLevel = quizWords[currentQuizIndex].level;

        // 레벨업(진화) 발생 시
        if (newLevel > currentLevel) {
            dino.emoji = evolutionEmojis[newLevel];
            playSound('levelup');
            fireConfetti();
            fireConfetti(); // 빵빠레 2배
            
            // 화면 중앙 진화 메시지 표시
            const lvMsg = document.getElementById('levelup-msg');
            lvMsg.classList.remove('hidden');
            setTimeout(() => lvMsg.classList.add('hidden'), 2000);
        }

        initQuiz();
    }
</script>
