<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Spelling Master</title>
    
    <!-- PWA 및 모바일 최적화 메타 태그 -->
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DinoSpell">
    
    <link rel="icon" type="image/jpeg" href="image_20362e.jpg">
    <link rel="apple-touch-icon" href="image_20362e.jpg">
    
    <script>
        try {
            let iconUrl = "image_20362e.jpg";
            let startUrl = ".";
            try {
                iconUrl = new URL("image_20362e.jpg", window.location.href).href;
                startUrl = new URL(".", window.location.href).href;
            } catch (e) {
                console.warn("Using relative URLs for manifest in preview environment.");
            }
            const manifest = {
                name: "Dino Spelling Master",
                short_name: "DinoSpell",
                start_url: startUrl,
                display: "standalone",
                background_color: "#f3f4f6",
                theme_color: "#3b82f6",
                icons: [
                    { src: iconUrl, sizes: "192x192", type: "image/jpeg", purpose: "any maskable" },
                    { src: iconUrl, sizes: "512x512", type: "image/jpeg", purpose: "any maskable" }
                ]
            };
            const blob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
            const link = document.createElement("link");
            link.rel = "manifest";
            link.href = URL.createObjectURL(blob);
            document.head.appendChild(link);
        } catch (error) {
            console.error("PWA Manifest creation failed:", error);
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f3f4f6; touch-action: manipulation; }
        canvas { display: block; image-rendering: pixelated; }
        .spell-btn { transition: transform 0.1s active, opacity 0.3s; }
        .spell-btn:not(:disabled):active { transform: scale(0.95); }
        .invincible-glow { box-shadow: 0 0 20px #fbbf24; border: 2px solid #fbbf24; }
        @keyframes confetti-fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(800px) rotate(720deg); opacity: 0; }
        }
        .confetti-piece { position: absolute; width: 8px; height: 16px; z-index: 50; pointer-events: none; }
        
        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>

<script>
    // --- 효과음 (Web Audio API) 설정 ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playSound(type) {
        if (!gameStarted || audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        
        if (type === 'jump') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
            gainNode.gain.setValueAtTime(0.15, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'correct') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(800, now);
            gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
            gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'power') {
            osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.setValueAtTime(600, now + 0.1); osc.frequency.setValueAtTime(800, now + 0.2);
            gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(now); osc.stop(now + 0.4);
        } else if (type === 'levelup') {
            osc.type = 'square'; osc.frequency.setValueAtTime(300, now); osc.frequency.setValueAtTime(500, now + 0.15); osc.frequency.setValueAtTime(700, now + 0.3); osc.frequency.setValueAtTime(1000, now + 0.45);
            gainNode.gain.setValueAtTime(0.15, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.8);
            osc.start(now); osc.stop(now + 0.8);
        } else if (type === 'gameover') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
            gainNode.gain.setValueAtTime(0.2, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now); osc.stop(now + 0.5);
        }
    }

    function fireConfetti() {
        const container = document.getElementById('quiz-container');
        const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#42a5f5', '#66bb6a'];
        for (let i = 0; i < 40; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti-piece rounded-sm';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.left = Math.random() * 100 + '%';
            conf.style.top = '-20px';
            const duration = Math.random() * 1.5 + 1;
            conf.style.animation = `confetti-fall ${duration}s ease-in forwards`;
            container.appendChild(conf);
            setTimeout(() => conf.remove(), duration * 1000);
        }
    }

    // --- 환경 테마 데이터 ---
    const themeData = {

        3: { name: "깊은 늪지대", bg: '#dcfce7', ground: '#86efac', text: '#14532d', hiText: '#22c55e', obstacles: ['🐸', '🌿', '🪵', '🐍'], nightVision: false },
        4: { name: "뜨거운 화산", bg: '#fee2e2', ground: '#fca5a5', text: '#7f1d1d', hiText: '#ef4444', obstacles: ['🌋', '🔥', '🪨', '🦴'], nightVision: false },
        5: { name: "얼어붙은 설원", bg: '#f0fdfa', ground: '#a5f3fc', text: '#164e63', hiText: '#06b6d4', obstacles: ['⛄', '🧊', '❄️', '🐧'], nightVision: false },
        6: { name: "끝없는 우주", bg: '#1e1b4b', ground: '#4c1d95', text: '#e0e7ff', hiText: '#a5b4fc', obstacles: ['☄️', '⭐', '🛸', '🛰️'], nightVision: true }
    };

    // --- 데이터 설정 ---
    const quizWords = [
        { level: 1, word: "CAT", hint: "고양이", icon: "🐱" }, { level: 1, word: "DOG", hint: "개", icon: "🐶" },
        { level: 1, word: "SUN", hint: "태양", icon: "☀️" }, { level: 1, word: "CAR", hint: "자동차", icon: "🚗" },
        { level: 1, word: "HAT", hint: "모자", icon: "🧢" }, { level: 1, word: "BOY", hint: "소년", icon: "👦" },
        { level: 1, word: "PIG", hint: "돼지", icon: "🐷" }, { level: 1, word: "BED", hint: "침대", icon: "🛏️" },
        { level: 1, word: "CUP", hint: "컵", icon: "☕" }, { level: 1, word: "BOX", hint: "상자", icon: "📦" },

        { level: 2, word: "BIRD", hint: "새", icon: "🐦" }, { level: 2, word: "FISH", hint: "물고기", icon: "🐟" },
        { level: 2, word: "TREE", hint: "나무", icon: "🌳" }, { level: 2, word: "STAR", hint: "별", icon: "⭐" },
        { level: 2, word: "BOOK", hint: "책", icon: "📖" }, { level: 2, word: "MILK", hint: "우유", icon: "🥛" },
        { level: 2, word: "DUCK", hint: "오리", icon: "🦆" }, { level: 2, word: "MOON", hint: "달", icon: "🌙" },
        { level: 2, word: "SHOE", hint: "신발", icon: "👞" }, { level: 2, word: "DOOR", hint: "문", icon: "🚪" },

        { level: 3, word: "APPLE", hint: "사과", icon: "🍎" }, { level: 3, word: "WATER", hint: "물", icon: "💧" },
        { level: 3, word: "CLOCK", hint: "시계", icon: "⏰" }, { level: 3, word: "MOUSE", hint: "쥐", icon: "🐭" },
        { level: 3, word: "TRAIN", hint: "기차", icon: "🚆" }, { level: 3, word: "GRAPE", hint: "포도", icon: "🍇" },
        { level: 3, word: "HOUSE", hint: "집", icon: "🏠" }, { level: 3, word: "TIGER", hint: "호랑이", icon: "🐯" },
        { level: 3, word: "CHAIR", hint: "의자", icon: "🪑" }, { level: 3, word: "PANDA", hint: "판다", icon: "🐼" },

        { level: 4, word: "RABBIT", hint: "토끼", icon: "🐰" }, { level: 4, word: "BANANA", hint: "바나나", icon: "🍌" },
        { level: 4, word: "YELLOW", hint: "노란색", icon: "🟨" }, { level: 4, word: "PENCIL", hint: "연필", icon: "✏️" },
        { level: 4, word: "FLOWER", hint: "꽃", icon: "🌸" }, { level: 4, word: "MONKEY", hint: "원숭이", icon: "🐒" },
        { level: 4, word: "SCHOOL", hint: "학교", icon: "🏫" }, { level: 4, word: "ORANGE", hint: "오렌지", icon: "🍊" },
        { level: 4, word: "CHEESE", hint: "치즈", icon: "🧀" }, { level: 4, word: "WINDOW", hint: "창문", icon: "🪟" },

        { level: 5, word: "DOCTOR", hint: "의사", icon: "👨‍⚕️" }, { level: 5, word: "ANIMAL", hint: "동물", icon: "🐾" },
        { level: 5, word: "CAMERA", hint: "카메라", icon: "📷" }, { level: 5, word: "GUITAR", hint: "기타", icon: "🎸" },
        { level: 5, word: "SUMMER", hint: "여름", icon: "☀️" }, { level: 5, word: "WINTER", hint: "겨울", icon: "❄️" },
        { level: 5, word: "POLICE", hint: "경찰", icon: "👮" }, { level: 5, word: "PLANET", hint: "행성", icon: "🪐" },
        { level: 5, word: "FAMILY", hint: "가족", icon: "👨‍👩‍👧‍👦" }, { level: 5, word: "ROCKET", hint: "로켓", icon: "🚀" },

        { level: 6, word: "ELEPHANT", hint: "코끼리", icon: "🐘" }, { level: 6, word: "DINOSAUR", hint: "공룡", icon: "🦖" },
        { level: 6, word: "HOSPITAL", hint: "병원", icon: "🏥" }, { level: 6, word: "AIRPLANE", hint: "비행기", icon: "✈️" },
        { level: 6, word: "UMBRELLA", hint: "우산", icon: "☂️" }, { level: 6, word: "COMPUTER", hint: "컴퓨터", icon: "💻" },
        { level: 6, word: "RAINBOW", hint: "무지개", icon: "🌈" }, { level: 6, word: "TEACHER", hint: "선생님", icon: "👩‍🏫" },
        { level: 6, word: "BASEBALL", hint: "야구", icon: "⚾" }, { level: 6, word: "MOUNTAIN", hint: "산", icon: "⛰️" }
    ];

    const evolutionEmojis = { 1: '🦎', 2: '🐢', 3: '🐊', 4: '🦖', 5: '🦕', 6: '🐉' };

    // --- 게임 상태 및 변수 ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let animationId;
    let gameState = 'PLAYING'; 
    let score = 0;
    let highScore = 0;
    let combo = 0;
    let isInvincible = false;
    let invincibleTimer = 0;

    const dino = { x: 50, y: 0, width: 52, height: 52, dy: 0, jumpForce: 15, gravity: 0.8, grounded: false, emoji: evolutionEmojis[1] };
    let obstacles = [];
    let gameSpeed = 6;
    let frameCount = 0;
    let gameStarted = false;

    let lives = 3;
    const MAX_LIVES = 3;
    let currentQuizIndex = 0;
    let isQuizTransitioning = false; 
    const QUIZ_TIME_LIMIT = 600; 
    let quizTimer = QUIZ_TIME_LIMIT;
    
    let currentGroundColor = '#d3d3d3';
    let currentNightVision = false;

    let hasUsedLastChance = false;
    let lastChanceWordData = { level: '🆘', word: "SURVIVE", hint: "생존하다", icon: "🆘", currentBlanks: [1, 4, 6] }; 
    
    let masteredWords = new Set();
    let reviewWords = new Set();
    let currentQuizMistakes = 0; 

    window.onload = () => {
        resizeCanvas();
        updateLivesDisplay();
        initQuiz();
        
        // 터치 간섭 버그 수정됨 (버튼일 경우 무시)
        document.getElementById('game-container').addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            if(!gameStarted || gameState !== 'PLAYING') return;
            handleJump();
        });
        document.getElementById('game-container').addEventListener('touchstart', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            e.preventDefault();
            if(!gameStarted || gameState !== 'PLAYING') return;
            handleJump();
        });

        window.addEventListener('keydown', (e) => {
            if(!gameStarted || gameState !== 'PLAYING') return;
            if (e.code === 'Space' || e.key === ' ' || e.code === 'ArrowUp') {
                e.preventDefault();
                handleJump();
            }
        });
    };

    function startGame() {
        gameStarted = true;
        gameState = 'PLAYING';
        if (audioCtx.state === 'suspended') audioCtx.resume();
        try {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen().catch(e => {});
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        } catch (error) {}
        
        if (document.activeElement) document.activeElement.blur();
        document.getElementById('start-screen').classList.add('hidden');
        resizeCanvas();
        animate();
    }

    window.addEventListener('resize', resizeCanvas);

    function resizeCanvas() {
        const container = document.getElementById('game-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        dino.y = canvas.height - dino.height - 20;
    }

    function handleJump() {
        if (dino.grounded) {
            dino.dy = -dino.jumpForce;
            dino.grounded = false;
            playSound('jump'); 
        }
    }

    function createObstacle() {
        const size = 40;
        const currentLevel = gameState === 'LAST_CHANCE' ? 6 : quizWords[currentQuizIndex].level;
        const themeLevel = currentLevel > 6 ? 6 : currentLevel;
        const currentObstacles = themeData[themeLevel].obstacles;
        
        const randomEmoji = currentObstacles[Math.floor(Math.random() * currentObstacles.length)];
        obstacles.push({ x: canvas.width, y: canvas.height - size - 20, width: size, height: size, emoji: randomEmoji });
    }

    function drawDino() {
        ctx.save();
        ctx.font = "52px 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif";
        ctx.textBaseline = "bottom";
        if (isInvincible) {
            ctx.shadowColor = '#fbbf24'; ctx.shadowBlur = 20;
            if (frameCount % 10 < 5) ctx.globalAlpha = 0.5;
        } else {
            ctx.shadowBlur = 0; ctx.globalAlpha = 1.0;
        }
        ctx.translate(dino.x + dino.width / 2, dino.y + dino.height);
        ctx.scale(-1, 1);
        ctx.fillText(dino.emoji, -dino.width / 2, 0);
        ctx.restore();
    }

    function drawObstacles() {
        ctx.font = "40px 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif";
        ctx.textBaseline = "bottom";
        obstacles.forEach((obs, index) => {
            if (gameState === 'PLAYING') obs.x -= gameSpeed;
            ctx.fillText(obs.emoji, obs.x, obs.y + obs.height);

            const hitMargin = 12;
            if (gameState === 'PLAYING' && !isInvincible &&
                dino.x + hitMargin < obs.x + obs.width - hitMargin &&
                dino.x + dino.width - hitMargin > obs.x + hitMargin &&
                dino.y + hitMargin < obs.y + obs.height - hitMargin &&
                dino.y + dino.height - hitMargin > obs.y + hitMargin) {
                
                triggerDeath();
            }

            if (obs.x + obs.width < 0) {
                obstacles.splice(index, 1);
                score += 10;
            }
        });
    }

    function drawGround() {
        ctx.strokeStyle = currentGroundColor; 
        ctx.beginPath(); ctx.moveTo(0, canvas.height - 20); ctx.lineTo(canvas.width, canvas.height - 20); ctx.stroke();
    }

    function updateLivesDisplay() {
        const lifeEl = document.getElementById('life-display');
        let hearts = '';
        for(let i = 0; i < MAX_LIVES; i++) hearts += i < lives ? '❤️' : '🤍';
        lifeEl.innerText = hearts;
        lifeEl.classList.add('scale-110', 'text-red-500');
        setTimeout(() => lifeEl.classList.remove('scale-110', 'text-red-500'), 200);
    }

    function updateUIAndTheme() {
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');
        const container = document.getElementById('game-container');
        
        scoreEl.innerText = `SCORE: ${String(Math.floor(score)).padStart(5, '0')}`;
        highScoreEl.innerText = `HI: ${String(Math.floor(highScore)).padStart(5, '0')}`;

        const currentLevel = gameState === 'LAST_CHANCE' ? 6 : quizWords[currentQuizIndex].level;
        const themeLevel = currentLevel > 6 ? 6 : currentLevel;
        const theme = themeData[themeLevel];

        container.style.backgroundColor = theme.bg;
        scoreEl.style.color = theme.text;
        highScoreEl.style.color = theme.hiText;
        
        currentGroundColor = theme.ground;
        currentNightVision = theme.nightVision;
    }

    function drawNightVision() {
        if (currentNightVision && gameState === 'PLAYING') {
            ctx.save();
            const targetRadius = isInvincible ? Math.max(canvas.width, canvas.height) : 120;
            const gradient = ctx.createRadialGradient(dino.x + dino.width/2, dino.y + dino.height/2, 0, dino.x + dino.width/2, dino.y + dino.height/2, targetRadius);
            gradient.addColorStop(0, 'rgba(30, 41, 59, 0)'); gradient.addColorStop(1, 'rgba(30, 41, 59, 0.98)');
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.restore();
        }
    }

    function animate() {
        if (gameState === 'GAMEOVER') return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (gameState === 'PLAYING') {
            frameCount++;
            score += 0.1;
            dino.dy += dino.gravity;
            dino.y += dino.dy;
            if (dino.y > canvas.height - dino.height - 20) { dino.y = canvas.height - dino.height - 20; dino.dy = 0; dino.grounded = true; }
            if (frameCount % 100 === 0) createObstacle();

            if (isInvincible) {
                invincibleTimer--;
                if (invincibleTimer <= 0) {
                    isInvincible = false;
                    document.getElementById('power-status').innerText = "OFF";
                    document.getElementById('power-bar').style.width = "0%";
                } else {
                    document.getElementById('power-bar').style.width = `${(invincibleTimer / 300) * 100}%`;
                }
            }
            gameSpeed = 6 + Math.floor(score / 500);
        }

        drawGround();
        drawObstacles();
        drawDino();
        drawNightVision();
        updateUIAndTheme();

        if (!isQuizTransitioning) {
            const currentLevel = gameState === 'LAST_CHANCE' ? 99 : quizWords[currentQuizIndex].level;
            if (currentLevel >= 4) {
                quizTimer--;
                const maxTime = gameState === 'LAST_CHANCE' ? 300 : QUIZ_TIME_LIMIT;
                const percentage = Math.max(0, (quizTimer / maxTime) * 100);
                document.getElementById('fuse-bar').style.width = percentage + '%';

                if (quizTimer <= 0) {
                    handleTimeUp();
                }
            }
        }

        animationId = requestAnimationFrame(animate);
    }

    function triggerDeath() {
        if (!hasUsedLastChance) {
            startLastChance();
        } else {
            showFinalGameOver();
        }
    }

    function handleTimeUp() {
        if (gameState === 'LAST_CHANCE') {
            showFinalGameOver(); 
            return;
        }

        playSound('wrong');
        lives--;
        updateLivesDisplay();
        
        if (lives <= 0) {
            showFeedback("시간 초과! 💀", false);
            triggerDeath();
        } else {
            showFeedback("시간 초과! 하트가 깎입니다.", false);
            combo = 0; updateCombo();
            currentQuizMistakes++;
            quizTimer = QUIZ_TIME_LIMIT; 
            if (navigator.vibrate) navigator.vibrate(100);
        }
    }

    function startLastChance() {
        hasUsedLastChance = true;
        gameState = 'LAST_CHANCE';
        playSound('power'); 
        showFeedback("위기 발생! 라스트 찬스!", false);
        
        const quizHeader = document.getElementById('quiz-header-area');
        quizHeader.classList.add('bg-red-100');
        document.getElementById('level-display').classList.replace('bg-blue-100', 'bg-red-600');
        document.getElementById('level-display').classList.replace('text-blue-800', 'text-white');
        document.getElementById('quiz-subtitle').classList.replace('text-blue-500', 'text-red-600');
        document.getElementById('quiz-subtitle').innerText = "LAST CHANCE!";
        
        quizTimer = 300; 
        currentQuizMistakes = 0;
        
        renderQuizOptions(lastChanceWordData);
    }

    function showFinalGameOver() {
        gameState = 'GAMEOVER';
        cancelAnimationFrame(animationId);
        playSound('gameover'); 

        if (score > highScore) highScore = score;
        
        const buttons = document.querySelectorAll('.spell-btn');
        buttons.forEach(btn => { btn.classList.add('opacity-50', 'cursor-not-allowed'); btn.disabled = true; });

        document.getElementById('master-count').innerText = masteredWords.size;
        document.getElementById('review-count').innerText = reviewWords.size;
        
        document.getElementById('master-list').innerText = masteredWords.size > 0 
            ? Array.from(masteredWords).join(', ') 
            : '아직 완벽히 마스터한 단어가 없어요. 다시 도전!';
            
        document.getElementById('review-list').innerText = reviewWords.size > 0 
            ? Array.from(reviewWords).join(', ') 
            : '틀린 단어가 없습니다! 대단해요!';

        document.getElementById('game-msg').classList.remove('hidden');
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }

    function resetGame() {
        // --- 초기화 시 덜 되던 버그 수정 ---
        score = 0; obstacles = []; frameCount = 0; gameSpeed = 6;
        combo = 0; // 콤보 초기화
        dino.dy = 0; // 다이노 속도 초기화
        
        gameState = 'PLAYING';
        isInvincible = false; lives = 3; currentQuizIndex = 0; isQuizTransitioning = false;
        dino.emoji = evolutionEmojis[1]; 
        
        hasUsedLastChance = false;
        masteredWords.clear(); reviewWords.clear();
        
        const quizHeader = document.getElementById('quiz-header-area');
        quizHeader.classList.remove('bg-red-100');
        document.getElementById('level-display').classList.replace('bg-red-600', 'bg-blue-100');
        document.getElementById('level-display').classList.replace('text-white', 'text-blue-800');
        document.getElementById('quiz-subtitle').classList.replace('text-red-600', 'text-blue-500');
        document.getElementById('quiz-subtitle').innerText = "Spelling Quiz";
        
        document.getElementById('game-msg').classList.add('hidden');
        document.getElementById('power-bar').style.width = "0%";
        updateLivesDisplay();
        updateCombo(); 
        
        const buttons = document.querySelectorAll('.spell-btn');
        buttons.forEach(btn => { btn.classList.remove('opacity-50', 'cursor-not-allowed'); btn.disabled = false; });

        initQuiz();
        updateUIAndTheme(); 
        animate();
    }

    function initQuiz() {
        currentQuizMistakes = 0;
        const quiz = quizWords[currentQuizIndex];
        isQuizTransitioning = false;
        quizTimer = QUIZ_TIME_LIMIT; 
        
        let numBlanks = quiz.level <= 2 ? 1 : (quiz.level <= 4 ? 2 : 3);
        numBlanks = Math.min(numBlanks, quiz.word.length - 1); 
        let blanks = [];
        while(blanks.length < numBlanks) {
            let r = Math.floor(Math.random() * quiz.word.length);
            if(!blanks.includes(r)) blanks.push(r);
        }
        quiz.currentBlanks = blanks.sort((a,b) => a-b);
        
        renderQuizOptions(quiz);
    }

    function renderQuizOptions(quizData) {
        const themeLevel = quizData.level > 6 ? 6 : (quizData.level === '🆘' ? 6 : quizData.level);
        const themeName = quizData.level === '🆘' ? 'LAST CHANCE' : `LEVEL ${quizData.level} : ${themeData[themeLevel].name}`;
        
        document.getElementById('level-display').innerText = themeName;
        document.getElementById('hint-icon').innerText = quizData.icon;
        document.getElementById('hint-text').innerText = quizData.hint || quizData.word; 
        
        const fuseContainer = document.getElementById('fuse-container');
        if (quizData.level >= 4 || gameState === 'LAST_CHANCE') {
            fuseContainer.classList.remove('hidden');
            document.getElementById('fuse-bar').style.width = '100%';
        } else {
            fuseContainer.classList.add('hidden');
        }
        
        const wordDisplay = document.getElementById('word-display');
        wordDisplay.innerHTML = '';
        
        let requiredLetters = quizData.currentBlanks.map(idx => quizData.word[idx]);
        let options = [...new Set(requiredLetters)]; 
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        while(options.length < 4) {
            let randomChar = alphabet[Math.floor(Math.random() * alphabet.length)];
            if(!options.includes(randomChar)) options.push(randomChar);
        }
        quizData.currentOptions = options.sort(() => Math.random() - 0.5);
        
        quizData.word.split('').forEach((char, idx) => {
            const span = document.createElement('span');
            if (quizData.currentBlanks.includes(idx)) {
                span.innerText = '_';
                span.className = 'border-b-2 sm:border-b-4 border-gray-400 w-5 sm:w-8 text-center';
                span.id = `blank-${idx}`;
            } else {
                span.innerText = char;
                span.className = 'w-5 sm:w-8 text-center text-gray-400';
            }
            wordDisplay.appendChild(span);
        });

        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        quizData.currentOptions.forEach(letter => {
            const btn = document.createElement('button');
            btn.className = 'spell-btn flex-1 aspect-square bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold rounded-lg sm:rounded-xl text-lg sm:text-2xl shadow-sm border-b-2 sm:border-b-4 border-gray-300 active:border-b-0 active:mt-0.5 sm:active:mt-1 flex items-center justify-center';
            btn.innerText = letter;
            btn.onclick = function() {
                if(isQuizTransitioning || gameState === 'GAMEOVER') return; 
                this.blur();
                checkAnswer(letter, quizData);
            };
            grid.appendChild(btn);
        });
    }

    function checkAnswer(letter, quizData) {
        const firstBlankIdx = quizData.currentBlanks.find(idx => document.getElementById(`blank-${idx}`).innerText === '_');
        
        if (firstBlankIdx !== undefined && quizData.word[firstBlankIdx] === letter) {
            playSound('correct'); 
            document.getElementById(`blank-${firstBlankIdx}`).innerText = letter;
            document.getElementById(`blank-${firstBlankIdx}`).classList.replace('text-gray-400', 'text-blue-600');
            
            const remaining = quizData.currentBlanks.some(idx => document.getElementById(`blank-${idx}`).innerText === '_');
            
            if (!remaining) {
                isQuizTransitioning = true; 
                
                if (gameState === 'PLAYING') {
                    if (currentQuizMistakes === 0) masteredWords.add(quizData.word);
                    else reviewWords.add(quizData.word);
                }

                if (gameState === 'LAST_CHANCE') {
                    showFeedback("생존 성공! 부활합니다!", true);
                    setTimeout(() => {
                        gameState = 'PLAYING';
                        lives = 1; updateLivesDisplay(); 
                        obstacles = []; 
                        activatePower();
                        
                        const quizHeader = document.getElementById('quiz-header-area');
                        quizHeader.classList.remove('bg-red-100');
                        document.getElementById('level-display').classList.replace('bg-red-600', 'bg-blue-100');
                        document.getElementById('level-display').classList.replace('text-white', 'text-blue-800');
                        document.getElementById('quiz-subtitle').classList.replace('text-red-600', 'text-blue-500');
                        document.getElementById('quiz-subtitle').innerText = "Spelling Quiz";
                        
                        initQuiz(); 
                    }, 1500);
                } else {
                    showFeedback("참 잘했어요! 무적 모드 발동!", true);
                    activatePower();
                    setTimeout(() => nextQuiz(), 1000);
                }
            }
        } else {
            playSound('wrong'); 
            currentQuizMistakes++;
            
            if (gameState === 'LAST_CHANCE') {
                showFeedback("오타 발생! 생존 실패...", false);
                showFinalGameOver();
                return;
            }

            lives--;
            updateLivesDisplay();
            
            if (lives <= 0) {
                showFeedback("생명 소진 💀", false);
                triggerDeath(); 
            } else {
                showFeedback("틀렸어요! 다시 생각해보세요.", false);
                combo = 0; updateCombo();
            }
            if (navigator.vibrate) navigator.vibrate(100);
        }
    }

    function showFeedback(msg, isSuccess) {
        const el = document.getElementById('feedback-msg');
        el.innerText = msg;
        el.className = `h-5 sm:h-8 text-xs sm:text-base font-bold transition-all duration-300 opacity-100 mb-1 sm:mb-2 ${isSuccess ? 'text-green-500' : 'text-red-500'}`;
        setTimeout(() => el.className = 'h-5 sm:h-8 text-xs sm:text-base font-bold transition-all duration-300 opacity-0 mb-1 sm:mb-2', 1500);
    }

    function activatePower() {
        playSound('power'); fireConfetti();     
        combo++; updateCombo();
        isInvincible = true; invincibleTimer = 300;
        document.getElementById('power-status').innerText = "ON (SUPER!)";
        document.getElementById('power-status').classList.add('text-orange-500');
        score += 100;
    }

    function updateCombo() {
        document.getElementById('combo-count').innerText = combo;
    }

    function nextQuiz() {
        const currentLevel = quizWords[currentQuizIndex].level;
        currentQuizIndex = (currentQuizIndex + 1) % quizWords.length;
        const newLevel = quizWords[currentQuizIndex].level;

        if (newLevel > currentLevel) {
            dino.emoji = evolutionEmojis[newLevel] || evolutionEmojis[6];
            playSound('levelup'); fireConfetti(); fireConfetti(); 
            const lvMsg = document.getElementById('levelup-msg');
            lvMsg.classList.remove('hidden'); setTimeout(() => lvMsg.classList.add('hidden'), 2000);
        }
        initQuiz();
    }
</script>
