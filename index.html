<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Spelling Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f3f4f6;
            touch-action: manipulation;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        .spell-btn {
            transition: transform 0.1s active;
        }
        .spell-btn:active {
            transform: scale(0.95);
        }
        /* 무적 상태 시각 효과 */
        .invincible-glow {
            box-shadow: 0 0 20px #fbbf24;
            border: 2px solid #fbbf24;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen w-screen">

<div id="app" class="flex w-full h-full overflow-hidden">
    <!-- 좌측: 다이노 게임 영역 (60%) -->
    <div id="game-container" class="relative flex-[6] bg-[#f7f7f7] border-r-4 border-gray-300 overflow-hidden cursor-pointer">
        <div class="absolute top-4 left-4 z-10 flex flex-col gap-1">
            <div id="score" class="text-2xl font-bold text-gray-700">SCORE: 00000</div>
            <div id="high-score" class="text-sm font-semibold text-gray-500">HI: 00000</div>
        </div>
        
        <div id="game-msg" class="absolute inset-0 flex items-center justify-center z-20 hidden">
            <div class="bg-white/90 p-6 rounded-2xl shadow-xl text-center">
                <h2 class="text-3xl font-black text-gray-800 mb-2">GAME OVER</h2>
                <p class="text-gray-600 mb-4">다시 시작하려면 화면을 클릭하거나 키를 누르세요</p>
                <button onclick="resetGame()" class="bg-gray-800 text-white px-6 py-2 rounded-full font-bold">RESTART</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- 우측: 스펠링 퀴즈 영역 (40%) -->
    <div id="quiz-container" class="flex-[4] bg-white flex flex-col p-6 shadow-2xl z-10">
        <div class="flex-1 flex flex-col items-center justify-center space-y-8">
            <div class="text-center">
                <span class="text-xs font-bold text-blue-500 uppercase tracking-widest">Spelling Quiz</span>
                <h2 id="hint-text" class="text-3xl font-black text-gray-800 mt-1">사과</h2>
            </div>

            <!-- 단어 표시 영역 -->
            <div id="word-display" class="flex gap-2 text-4xl font-mono font-bold text-gray-800">
                <!-- A _ _ L E 형태 -->
            </div>

            <!-- 메시지 박스 (결과 알림) -->
            <div id="feedback-msg" class="h-8 text-lg font-bold transition-all duration-300 opacity-0">
                정답입니다! (+보너스)
            </div>

            <!-- 선택 블록 영역 -->
            <div id="options-grid" class="grid grid-cols-2 gap-4 w-full max-w-xs">
                <!-- 버튼들 -->
            </div>
        </div>

        <div class="mt-auto pt-6 border-t border-gray-100">
            <div class="flex items-center justify-between text-sm text-gray-400 font-medium">
                <span>COMBO: <span id="combo-count" class="text-orange-500 font-bold">0</span></span>
                <span>Power Mode: <span id="power-status">OFF</span></span>
            </div>
            <div class="w-full bg-gray-200 h-2 rounded-full mt-2 overflow-hidden">
                <div id="power-bar" class="bg-blue-500 h-full w-0 transition-all duration-300"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 데이터 설정 ---
    const quizWords = [
        { word: "APPLE", hint: "사과", blanks: [1, 2, 4], options: ["P", "E", "R", "T"] },
        { word: "BANANA", hint: "바나나", blanks: [1, 3, 5], options: ["A", "N", "B", "M"] },
        { word: "ORANGE", hint: "오렌지", blanks: [1, 2, 5], options: ["R", "A", "G", "E"] },
        { word: "SCHOOL", hint: "학교", blanks: [1, 2, 5], options: ["C", "H", "L", "O"] },
        { word: "MELON", hint: "멜론", blanks: [1, 2, 3], options: ["E", "L", "O", "N"] }
    ];

    // --- 게임 변수 ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let animationId;
    let gameActive = true;
    let score = 0;
    let highScore = 0;
    let combo = 0;
    let isInvincible = false;
    let invincibleTimer = 0;

    // 다이노 설정
    const dino = {
        x: 50,
        y: 0,
        width: 44,
        height: 47,
        dy: 0,
        jumpForce: 15,
        gravity: 0.8,
        grounded: false,
        color: '#535353'
    };

    let obstacles = [];
    let gameSpeed = 6;
    let frameCount = 0;

    // --- 퀴즈 변수 ---
    let currentQuizIndex = 0;
    let solvedCount = 0;

    // --- 초기화 및 실행 ---
    window.onload = () => {
        resizeCanvas();
        initQuiz();
        animate();
        
        // 클릭/터치 이벤트 (점프 및 재시작)
        document.getElementById('game-container').addEventListener('mousedown', () => {
            if(gameActive) handleJump();
            else resetGame();
        });
        document.getElementById('game-container').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(gameActive) handleJump();
            else resetGame();
        });

        // 키보드 이벤트 추가 (PC 사용자용)
        window.addEventListener('keydown', (e) => {
            // 스페이스바(Space) 또는 위쪽 화살표(ArrowUp)로 점프
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault(); // 스크롤 방지
                if(gameActive) handleJump();
                else resetGame();
            }
        });
    };

    window.addEventListener('resize', resizeCanvas);

    function resizeCanvas() {
        const container = document.getElementById('game-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        dino.y = canvas.height - dino.height - 20;
    }

    // --- 다이노 게임 로직 ---
    function handleJump() {
        if (dino.grounded) {
            dino.dy = -dino.jumpForce;
            dino.grounded = false;
        }
    }

    function createObstacle() {
        const height = 30 + Math.random() * 30;
        obstacles.push({
            x: canvas.width,
            y: canvas.height - height - 20,
            width: 20,
            height: height,
            color: '#ff4d4d'
        });
    }

    function drawDino() {
        ctx.fillStyle = isInvincible ? (frameCount % 10 < 5 ? '#fbbf24' : '#535353') : dino.color;
        // 간단한 공룡 모양 (사각형 조합)
        ctx.fillRect(dino.x, dino.y, dino.width, dino.height);
        // 눈
        ctx.fillStyle = 'white';
        ctx.fillRect(dino.x + 30, dino.y + 10, 5, 5);
    }

    function drawObstacles() {
        obstacles.forEach((obs, index) => {
            obs.x -= gameSpeed;
            ctx.fillStyle = obs.color;
            ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

            // 충돌 감지
            if (!isInvincible &&
                dino.x < obs.x + obs.width &&
                dino.x + dino.width > obs.x &&
                dino.y < obs.y + obs.height &&
                dino.y + dino.height > obs.y) {
                gameOver();
            }

            // 화면 밖으로 나감
            if (obs.x + obs.width < 0) {
                obstacles.splice(index, 1);
                score += 10;
            }
        });
    }

    function drawGround() {
        ctx.strokeStyle = '#d3d3d3';
        ctx.beginPath();
        ctx.moveTo(0, canvas.height - 20);
        ctx.lineTo(canvas.width, canvas.height - 20);
        ctx.stroke();
    }

    function updateScore() {
        document.getElementById('score').innerText = `SCORE: ${String(Math.floor(score)).padStart(5, '0')}`;
        document.getElementById('high-score').innerText = `HI: ${String(Math.floor(highScore)).padStart(5, '0')}`;
    }

    function animate() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        frameCount++;
        score += 0.1;

        // 중력 처리
        dino.dy += dino.gravity;
        dino.y += dino.dy;

        if (dino.y > canvas.height - dino.height - 20) {
            dino.y = canvas.height - dino.height - 20;
            dino.dy = 0;
            dino.grounded = true;
        }

        // 장애물 생성
        if (frameCount % 100 === 0) {
            createObstacle();
        }

        // 무적 시간 관리
        if (isInvincible) {
            invincibleTimer--;
            if (invincibleTimer <= 0) {
                isInvincible = false;
                document.getElementById('power-status').innerText = "OFF";
                document.getElementById('power-bar').style.width = "0%";
            } else {
                document.getElementById('power-bar').style.width = `${(invincibleTimer / 300) * 100}%`;
            }
        }

        drawGround();
        drawObstacles();
        drawDino();
        updateScore();

        gameSpeed = 6 + Math.floor(score / 500);

        animationId = requestAnimationFrame(animate);
    }

    function gameOver() {
        gameActive = false;
        cancelAnimationFrame(animationId);
        if (score > highScore) highScore = score;
        document.getElementById('game-msg').classList.remove('hidden');
    }

    function resetGame() {
        score = 0;
        obstacles = [];
        frameCount = 0;
        gameSpeed = 6;
        gameActive = true;
        isInvincible = false;
        document.getElementById('game-msg').classList.add('hidden');
        document.getElementById('power-bar').style.width = "0%";
        animate();
    }

    // --- 퀴즈 로직 ---
    function initQuiz() {
        const quiz = quizWords[currentQuizIndex];
        document.getElementById('hint-text').innerText = quiz.hint;
        
        const wordDisplay = document.getElementById('word-display');
        wordDisplay.innerHTML = '';
        
        // 단어 렌더링 (일부 빈칸)
        quiz.word.split('').forEach((char, idx) => {
            const span = document.createElement('span');
            if (quiz.blanks.includes(idx)) {
                span.innerText = '_';
                span.className = 'border-b-4 border-gray-300 w-8 text-center';
                span.id = `blank-${idx}`;
            } else {
                span.innerText = char;
                span.className = 'w-8 text-center text-gray-400';
            }
            wordDisplay.appendChild(span);
        });

        // 옵션 버튼 렌더링
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        quiz.options.forEach(letter => {
            const btn = document.createElement('button');
            btn.className = 'spell-btn bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-4 rounded-xl text-xl shadow-sm border-b-4 border-gray-300 active:border-b-0 active:mt-1';
            btn.innerText = letter;
            btn.onclick = () => checkAnswer(letter);
            grid.appendChild(btn);
        });
    }

    function checkAnswer(letter) {
        const quiz = quizWords[currentQuizIndex];
        // 현재 채워야 할 가장 첫 번째 빈칸 찾기
        const firstBlankIdx = quiz.blanks.find(idx => document.getElementById(`blank-${idx}`).innerText === '_');
        
        if (firstBlankIdx !== undefined && quiz.word[firstBlankIdx] === letter) {
            // 정답
            document.getElementById(`blank-${firstBlankIdx}`).innerText = letter;
            document.getElementById(`blank-${firstBlankIdx}`).classList.remove('text-gray-400');
            document.getElementById(`blank-${firstBlankIdx}`).classList.add('text-blue-600');
            
            // 모든 빈칸이 채워졌는지 확인
            const remaining = quiz.blanks.some(idx => document.getElementById(`blank-${idx}`).innerText === '_');
            if (!remaining) {
                showFeedback("참 잘했어요! 무적 모드 발동!", true);
                activatePower();
                setTimeout(() => {
                    nextQuiz();
                }, 1000);
            }
        } else {
            // 오답
            showFeedback("틀렸어요! 다시 생각해보세요.", false);
            combo = 0;
            updateCombo();
        }
    }

    function showFeedback(msg, isSuccess) {
        const el = document.getElementById('feedback-msg');
        el.innerText = msg;
        el.className = `h-8 text-lg font-bold transition-all duration-300 opacity-100 ${isSuccess ? 'text-green-500' : 'text-red-500'}`;
        setTimeout(() => {
            el.className = 'h-8 text-lg font-bold transition-all duration-300 opacity-0';
        }, 1500);
    }

    function activatePower() {
        combo++;
        updateCombo();
        isInvincible = true;
        invincibleTimer = 300; // 약 5초 (60fps 기준)
        document.getElementById('power-status').innerText = "ON (SUPER!)";
        document.getElementById('power-status').classList.add('text-orange-500');
        score += 100;
    }

    function updateCombo() {
        document.getElementById('combo-count').innerText = combo;
    }

    function nextQuiz() {
        currentQuizIndex = (currentQuizIndex + 1) % quizWords.length;
        initQuiz();
    }
</script>

</body>
</html>
